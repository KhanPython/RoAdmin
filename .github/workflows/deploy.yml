name: Deploy RoAdmin Bot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DISCORD_TOKEN,ENCRYPTION_KEY
          script: |
            set -euo pipefail

            APP_DIR="/home/orazimbetov_jalaladdin1/RoAdmin"
            APP_NAME="RoAdmin"

            export PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.npm-global/bin:$PATH"

            # 0. Pull latest code (clean slate)
            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"
            git fetch --all
            git reset --hard origin/master
            git clean -fd

            # 2. Write .env — secrets passed as env vars, never interpolated into the script text
            printf 'DISCORD_TOKEN=%s\nENCRYPTION_KEY=%s\nNODE_ENV=production\n' \
              "$DISCORD_TOKEN" "$ENCRYPTION_KEY" > .env
            chmod 600 .env

            # 3. Install production dependencies (incremental — only installs what changed)
            npm install --omit=dev

            # 4. Restart the bot — delete old process, start fresh
            # Keep the PM2 daemon alive so 'pm2 logs' works from interactive SSH.
            # Only kill+recreate the daemon if it's unreachable (stale socket, etc.)
            if ! pm2 ping >/dev/null 2>&1; then
              echo "PM2 daemon unreachable — killing stale daemon"
              pm2 kill 2>/dev/null || true
            fi
            pm2 delete "$APP_NAME" 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            # 5. Quick sanity check
            pm2 list
