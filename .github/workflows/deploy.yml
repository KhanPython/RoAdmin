name: Deploy RoAdmin Bot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Google Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Load shell paths
            source ~/.bashrc || source ~/.profile

            # 2. Sync Code
            cd ~/RoAdmin
            /usr/bin/git fetch --all
            /usr/bin/git reset --hard origin/master
            /usr/bin/git clean -fd

            # 3. Create .env in root
            echo "DISCORD_TOKEN=\"${{ secrets.DISCORD_TOKEN }}\"" > .env
            echo "ENCRYPTION_KEY=\"${{ secrets.ENCRYPTION_KEY }}\"" >> .env
            echo "NODE_ENV=\"production\"" >> .env

            # 4. Install
            /usr/bin/npm install --production

            # 5. Wipe the old instance and start fresh to apply .env and code changes
            $PM2_PATH delete RoAdmin 2>/dev/null || true
            $PM2_PATH start src/index.js --name "RoAdmin" --cwd "/home/orazimbetov_jalaladdin1/RoAdmin"
            $PM2_PATH save
