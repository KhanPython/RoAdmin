name: Deploy RoAdmin Bot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DISCORD_TOKEN,ENCRYPTION_KEY
          script: |
            set -euo pipefail

            APP_DIR="/home/orazimbetov_jalaladdin1/RoAdmin"
            APP_NAME="RoAdmin"

            export PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.npm-global/bin:$PATH"

            # 0. Fix ownership if the repo was previously cloned as root or another user.
            #    This resolves both "dubious ownership" and "Permission denied" on .git files.
            sudo chown -R "$(whoami):$(whoami)" "$APP_DIR"

            # 1. Pull latest code (clean slate)
            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/master
            git clean -fd

            # 2. Write .env — secrets passed as env vars, never interpolated into the script text
            printf 'DISCORD_TOKEN=%s\nENCRYPTION_KEY=%s\nNODE_ENV=production\nNODE_OPTIONS=--unhandled-rejections=strict\n' \
              "$DISCORD_TOKEN" "$ENCRYPTION_KEY" > .env
            chmod 600 .env

            # 3. Clean install of production dependencies
            npm ci --omit=dev

            # 4. Delete the old process entirely (ensures a true fresh start)
            pm2 delete "$APP_NAME" 2>/dev/null || true

            # 5. Start the bot fresh
            pm2 start src/index.js \
              --name "$APP_NAME" \
              --cwd "$APP_DIR" \
              --max-memory-restart 300M \
              --restart-delay 3000 \
              --max-restarts 5 \
              --time \
              --output "$HOME/.pm2/logs/${APP_NAME}-out.log" \
              --error  "$HOME/.pm2/logs/${APP_NAME}-error.log" \
              --node-args="--no-warnings" \
              -- --unhandled-rejections=strict

            # 6. Persist PM2 process list so the bot survives VM reboots
            pm2 save
