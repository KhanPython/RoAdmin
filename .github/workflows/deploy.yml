name: Deploy RoAdmin Bot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Google Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Setup Environment
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            source ~/.bashrc || source ~/.profile

            # Explicitly define paths again inside the shell to be 100% sure
            PM2="/usr/local/bin/pm2"
            GIT="/usr/bin/git"
            NPM="/usr/bin/npm"

            # 2. Sync Code
            cd /home/orazimbetov_jalaladdin1/RoAdmin || exit 1
            $GIT fetch --all
            $GIT reset --hard origin/master
            $GIT clean -fd

            # 3. Create .env
            echo "DISCORD_TOKEN=\"${{ secrets.DISCORD_TOKEN }}\"" > .env
            echo "ENCRYPTION_KEY=\"${{ secrets.ENCRYPTION_KEY }}\"" >> .env
            echo "NODE_ENV=\"production\"" >> .env

            # 4. Install
            $NPM install --production

            # 5. The "Fresh Start" Sequence
            $PM2 delete RoAdmin || true
            $PM2 start src/index.js --name "RoAdmin" --cwd "/home/orazimbetov_jalaladdin1/RoAdmin"
            $PM2 save
